<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banking System - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page-shell">
    <header class="topbar">
        <div>
            <h1>My Banking Dashboard</h1>
            <p>Manage your balance, transactions, and spending history.</p>
        </div>
        <nav>
            <span id="userEmail">Loading...</span>
            <a class="btn-secondary" href="logout.php">Logout</a>
        </nav>
    </header>

    <section class="summary-card">
        <div>
            <span>Current balance</span>
            <strong id="balance">$0.00</strong>
        </div>
        <div class="quick-actions">
            <button class="btn-success" onclick="deposit()">Deposit</button>
            <button class="btn-danger" onclick="withdraw()">Withdraw</button>
        </div>
    </section>

    <section class="transaction-panel">
        <div class="panel-header">
            <h2>Recent transactions</h2>
            <button class="btn-primary" onclick="exportTransactions()">Export CSV</button>
        </div>

        <div class="filter-row">
            <select id="filterType" onchange="applyFilters()">
                <option value="">All</option>
                <option value="deposit">Deposit</option>
                <option value="withdraw">Withdraw</option>
            </select>
            <input type="date" id="filterFrom" onchange="applyFilters()">
            <input type="date" id="filterTo" onchange="applyFilters()">
        </div>

        <div class="transaction-list" id="transactionsList">Loading transactions...</div>
    </section>

    <section class="action-form">
        <div>
            <label>Amount</label>
            <input type="number" id="amount" min="0.01" step="0.01" placeholder="0.00">
        </div>
        <div class="form-actions">
            <button class="btn-success" onclick="deposit()">Deposit</button>
            <button class="btn-danger" onclick="withdraw()">Withdraw</button>
        </div>
    </section>
</div>

<script src="dashboard.js"></script>
</body>
</html>
